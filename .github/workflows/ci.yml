name: CI

# Lint + typecheck + build the React front-end, then compile the Rust/Tauri
# backend. Kept as a single job on purpose: `tauri::generate_context!` embeds
# the front-end build (`frontendDist: ../dist`) at compile time, so the Rust
# build can only succeed once `npm run build` has produced `dist/`.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System libraries required to compile a Tauri v2 app on Linux.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl wget file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache the Rust build (keyed on src-tauri/Cargo.lock).
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `npm run build` runs `tsc -b` (typecheck) then `vite build` (produces
      # ../dist, which the Rust build embeds).
      - name: Build front-end
        run: npm run build

      - name: Build Rust backend
        run: cargo build --manifest-path src-tauri/Cargo.toml --locked
